name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"

      # Настройка проекта
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-{{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        run: go mod download

      - name: Verify go.mod tidy
        run: |
          go mod tidy
          git diff --exit-code

      - name: Check formatting
        run: |
          if [ "$gofmt -l ." ]; then
            echo "Go files not formatted"
            gofmt -d .
          fi

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Go Build
        run: go build ./...

      - name: Run Tests
        run: go test -race ./...

      # Настройка Утилиты
      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
          | sh -s -- -b $(go env GOPATH)/bin v2.11.3

      - name: Build golangci-lint custom binary
        run: |
          golangci-lint custom

      - name: Test custom golangci-list binary
        run: |
          chmod +x ./gcl-with-loglint
          ./gcl-with-loglint run ./testdata